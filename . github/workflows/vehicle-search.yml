name: Vehicle Search Bot

on:
  schedule:
    # Runs every 4 hours (0, 4, 8, 12, 16, 20 UTC)
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run vehicle search
        env:
          BREVO_SMTP_KEY: ${{ secrets.BREVO_SMTP_KEY }}
        run: node vehicle-search.js

      - name: Commit and push updated listings
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Vehicle Search Bot"
          git add sent-listings.json
          git commit -m "Update sent listings - $(date)" || echo "No changes to commit"
          git push
        continue-on-error: true
