name: Vehicle Search Bot

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - run: npm install
      
      - name: Run vehicle search
        env:
          BREVO_SMTP_KEY: ${{ secrets.BREVO_SMTP_KEY }}
        run: node vehicle-search.js
